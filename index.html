<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>서울 동네 교통 상태판</title>
<meta name="description" content="서울 열린데이터광장 실시간 교통 API로 수집한 동×시간대 교통 상태판">
<meta property="og:title" content="서울 동네 교통 상태판">
<meta property="og:description" content="서울 열린데이터광장 실시간 교통 API로 수집한 동×시간대 교통 상태판 — 주차 점유율·버스 혼잡·지하철 대기">
<meta property="og:type" content="website">
<meta property="og:url" content="https://asac-de-bigkk.github.io/seoul-transit-dashboard/">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🚌%3C/text%3E%3C/svg%3E">
<style>
/* ── design tokens (dataviz 계약) ─────────────────────────────────────────
   시퀀셜 blue 단일 색상. 텍스트는 잉크 토큰만. 라이트 기본 + prefers dark 별도값.
   [data-theme] 은 수동 토글이 미디어쿼리를 이기게 함. */
:root{
  --surface:#fcfcfb; --panel:#ffffff; --ink:#0b0b0b; --ink2:#52514e;
  --grid:#e1e0d9; --neutral:#f0efec; --axis:#898781; --line-strong:#256abf;
  --border:#e6e5df; --shadow:0 1px 3px rgba(0,0,0,.08),0 6px 20px rgba(0,0,0,.06);
}
@media (prefers-color-scheme:dark){
  :root{
    --surface:#1a1a19; --panel:#222220; --ink:#ffffff; --ink2:#c3c2b7;
    --grid:#2c2c2a; --neutral:#383835; --axis:#898781; --line-strong:#5598e7;
    --border:#333330; --shadow:0 1px 3px rgba(0,0,0,.4),0 6px 22px rgba(0,0,0,.35);
  }
}
:root[data-theme=light]{
  --surface:#fcfcfb; --panel:#ffffff; --ink:#0b0b0b; --ink2:#52514e;
  --grid:#e1e0d9; --neutral:#f0efec; --axis:#898781; --line-strong:#256abf;
  --border:#e6e5df; --shadow:0 1px 3px rgba(0,0,0,.08),0 6px 20px rgba(0,0,0,.06);
}
:root[data-theme=dark]{
  --surface:#1a1a19; --panel:#222220; --ink:#ffffff; --ink2:#c3c2b7;
  --grid:#2c2c2a; --neutral:#383835; --axis:#898781; --line-strong:#5598e7;
  --border:#333330; --shadow:0 1px 3px rgba(0,0,0,.4),0 6px 22px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--surface); color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  line-height:1.5; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1180px;margin:0 auto;padding:20px 18px 48px}
header h1{font-size:26px;margin:0 0 4px;letter-spacing:-.01em}
.sub{color:var(--ink2);font-size:14px;margin:0}
.asof{color:var(--axis);font-size:12.5px;margin:6px 0 0}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
.themebtn{
  background:var(--panel);color:var(--ink2);border:1px solid var(--border);
  border-radius:8px;padding:6px 11px;font-size:12.5px;cursor:pointer;font-family:inherit;
}
.themebtn:hover{color:var(--ink)}

/* tabs */
.tabs{display:flex;gap:8px;margin:20px 0 12px;flex-wrap:wrap}
.tab{
  background:var(--panel);color:var(--ink2);border:1px solid var(--border);
  border-radius:10px;padding:9px 15px;font-size:14px;cursor:pointer;font-family:inherit;
  transition:.12s;
}
.tab:hover{color:var(--ink)}
.tab[aria-selected=true]{
  background:var(--line-strong);color:#fff;border-color:var(--line-strong);font-weight:600;
}
.metricdesc{color:var(--ink2);font-size:13.5px;margin:0 0 10px}

/* coverage notice */
.coverage{
  border:1px solid var(--border);border-left:3px solid var(--line-strong);
  background:var(--panel);border-radius:8px;padding:10px 13px;font-size:13px;
  color:var(--ink2);margin:0 0 16px;
}
.coverage b{color:var(--ink)}

/* slider */
.sliderrow{display:flex;align-items:center;gap:14px;margin:0 0 14px;flex-wrap:wrap}
.sliderrow label{font-size:13px;color:var(--ink2);white-space:nowrap}
.hourval{font-variant-numeric:tabular-nums;font-weight:600;color:var(--ink);min-width:56px}
input[type=range]{flex:1;min-width:200px;accent-color:var(--line-strong);height:22px}

/* layout */
.grid{display:grid;grid-template-columns:1.55fr 1fr;gap:18px}
@media (max-width:820px){.grid{grid-template-columns:1fr}}
.card{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:14px;box-shadow:var(--shadow);
}
.card h2{font-size:14px;margin:0 0 10px;color:var(--ink2);font-weight:600}
.mapwrap{position:relative}
svg{display:block;width:100%;height:auto}
/* viewBox 폭 ≈ 990 유닛(SCALE=3000), 렌더 폭 ≈ 650px → 1 유닛 ≈ 0.65px.
   기본 1 유닛 ≈ 0.65px hairline, 선택 3 유닛 ≈ 2px 강조. */
.dong{stroke:var(--surface);stroke-width:1;cursor:pointer;transition:opacity .1s}
.dong:hover{opacity:.82}
.dong.sel{stroke:var(--ink);stroke-width:3}

/* legend */
.legend{margin-top:12px}
.legendbar{display:flex;height:14px;border-radius:4px;overflow:hidden}
.legendbar span{flex:1}
/* 경계 라벨은 색 경계와 기하 정렬되게 절대 배치(i/계급수 위치). */
.legendlabels{position:relative;height:16px;font-size:11px;
  color:var(--axis);font-variant-numeric:tabular-nums;margin-top:4px}
.legendlabels span{position:absolute;top:0;transform:translateX(-50%);white-space:nowrap}
.legendlabels span.edge-lo{transform:none}
.legendlabels span.edge-hi{transform:translateX(-100%)}
.legendnote{font-size:11.5px;color:var(--axis);margin-top:6px;display:flex;align-items:center;gap:6px}
.swatch-na{width:12px;height:12px;border-radius:3px;background:var(--neutral);
  border:1px solid var(--border);display:inline-block;vertical-align:-2px}

/* tooltip */
.tip{
  position:fixed;pointer-events:none;z-index:20;background:var(--panel);
  border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12.5px;
  box-shadow:var(--shadow);color:var(--ink);max-width:230px;opacity:0;transition:opacity .08s;
}
.tip .t-name{font-weight:600}
.tip .t-gu{color:var(--ink2);font-size:11.5px}
.tip .t-val{margin-top:4px;font-variant-numeric:tabular-nums}
.tip .t-obs{color:var(--axis);font-size:11px;margin-top:2px}

/* detail panel */
.detail .placeholder{color:var(--axis);font-size:13px;text-align:center;padding:36px 8px}
.detail .dname{font-size:16px;font-weight:700;margin:0}
.detail .dgu{color:var(--ink2);font-size:12.5px;margin:0 0 6px}
.mini{display:flex;gap:8px;margin:10px 0 6px}
.mini .m{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 9px}
.mini .m .lab{font-size:11px;color:var(--ink2)}
.mini .m .now{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}
.mini .m .avg{font-size:11px;color:var(--axis);margin-top:1px}
.chartcap{font-size:12px;color:var(--ink2);margin:8px 0 2px}

/* table */
.tabletoggle{margin:20px 0 0}
.tbtn{background:var(--panel);color:var(--ink2);border:1px solid var(--border);
  border-radius:8px;padding:7px 13px;font-size:13px;cursor:pointer;font-family:inherit}
.tbtn:hover{color:var(--ink)}
.tablewrap{overflow-x:auto;margin-top:12px;border:1px solid var(--border);border-radius:10px}
table{border-collapse:collapse;width:100%;font-size:13px}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
th{color:var(--ink2);font-weight:600;cursor:pointer;position:sticky;top:0;background:var(--panel)}
th:hover{color:var(--ink)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tbody tr:hover{background:var(--neutral)}
.hidden{display:none}

/* 실시간 도착 전광판 (지하철 실시간 도착정보 API 직접 구동) */
.board{margin:18px 0 4px}
.board .bhead{display:flex;justify-content:space-between;align-items:baseline;
  gap:12px;flex-wrap:wrap;margin:0 0 3px}
.board h2{font-size:15px;margin:0;color:var(--ink);font-weight:700}
.board .bmeta{font-size:12px;color:var(--axis);font-variant-numeric:tabular-nums}
.board .bnote{font-size:12.5px;color:var(--ink2);margin:0 0 12px}
.stations{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media (max-width:820px){.stations{grid-template-columns:1fr}}
.stn{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:12px 13px;box-shadow:var(--shadow)}
.stn .snm{font-size:15px;font-weight:700;margin:0}
.stn .srecv{font-size:11.5px;color:var(--axis);margin:1px 0 6px;
  font-variant-numeric:tabular-nums}
.arr{display:flex;align-items:center;gap:9px;padding:7px 0;
  border-top:1px solid var(--border)}
.arr:first-of-type{border-top:0}
.arr .chip{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.arr .who{flex:1;min-width:0}
.arr .svc{font-size:12.5px;color:var(--ink);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.arr .dir{font-size:11px;color:var(--ink2)}
.arr .eta{text-align:right;flex:0 0 auto;max-width:46%}
.arr .eta .t{font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums;
  color:var(--line-strong);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.arr .eta .m{font-size:10.5px;color:var(--axis);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}

footer{margin-top:34px;padding-top:16px;border-top:1px solid var(--border);
  font-size:12px;color:var(--axis)}
footer a{color:var(--ink2)}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="topbar">
      <div>
        <h1>서울 동네 교통 상태판</h1>
        <p class="sub">서울 열린데이터광장 실시간 교통 API를 20분 주기로 수집해 집계한 동×시간대 상태</p>
        <p class="asof" id="asof"></p>
      </div>
      <button class="themebtn" id="themebtn" title="라이트/다크 전환">◐ 테마</button>
    </div>
  </header>

  <section class="board" id="board"></section>

  <div class="tabs" role="tablist" id="tabs">
    <button class="tab" role="tab" data-metric="parking" aria-selected="true">주차 점유율</button>
    <button class="tab" role="tab" data-metric="bus" aria-selected="false">버스 혼잡도</button>
    <button class="tab" role="tab" data-metric="subway" aria-selected="false">지하철 대기시간</button>
  </div>
  <p class="metricdesc" id="metricdesc"></p>
  <div class="coverage" id="coverage"></div>

  <div class="sliderrow">
    <label for="hour">시간대</label>
    <input type="range" id="hour" min="0" max="23" step="1" value="18">
    <span class="hourval" id="hourval">18:00</span>
  </div>

  <div class="grid">
    <div class="card mapwrap">
      <h2 id="maptitle"></h2>
      <div id="mapholder"></div>
      <div class="legend">
        <div class="legendbar" id="legendbar"></div>
        <div class="legendlabels" id="legendlabels"></div>
        <div class="legendnote"><span class="swatch-na"></span>데이터 없는 동 (해당 시간·지표 관측 없음)</div>
      </div>
    </div>

    <div class="card detail" id="detail">
      <h2>동 상세</h2>
      <div class="placeholder" id="detailph">지도에서 동을 클릭하면 24시간 추이를 봅니다.</div>
      <div id="detailbody" class="hidden"></div>
    </div>
  </div>

  <div class="tabletoggle">
    <button class="tbtn" id="tabletoggle" aria-expanded="false">표로 보기 ▾</button>
    <div class="tablewrap hidden" id="tablewrap">
      <table id="datatable"><thead></thead><tbody></tbody></table>
    </div>
  </div>

  <footer>
    데이터: 서울 열린데이터광장 Open API — 지하철 실시간 도착 · 버스 실시간 위치 · 공영주차장 실시간 정보
    (인증키 발급 활용) · ASAC 데이터엔지니어링 팀 ·
    <a href="https://github.com/ASAC-DE-bigkk/seoul-transit-dashboard" target="_blank" rel="noopener">GitHub 저장소</a>
  </footer>
</div>

<div class="tip" id="tip"></div>

<script src="data/boundary.js"></script>
<script src="data/profile.js"></script>
<script src="data/arrivals.js"></script>
<script>
"use strict";
/* ══════════════════════════════════════════════════════════════════════════
   서울 동네 교통 상태판 — vanilla JS, 외부 의존성 없음.
   데이터: window.BOUNDARY(GeoJSON 폴리곤), window.PROFILE(동×시간 지표).
   시각 계약: 시퀀셜 blue 단일 램프(밝→어두움), 최대 6단계 분위수 분류
   (경계 중복 시 계급 수 자동 축소).
   ══════════════════════════════════════════════════════════════════════════ */

/* ── 색 램프: 지정된 13단계 blue 에서 6색 선택. 라이트/다크 별도.
   다크 램프는 밝은 시작을 한 칸 어둡게 하되, 최상위는 #104281 로 제한 —
   #0d366b 는 중립(무데이터) #383835 와 휘도가 거의 같아 지도에서 구분 불가. ── */
var RAMP_LIGHT = ["#cde2fb","#9ec5f4","#6da7ec","#3987e5","#256abf","#104281"];
var RAMP_DARK  = ["#b7d3f6","#86b6ef","#5598e7","#2a78d6","#1c5cab","#104281"];
var MAXCLASS = 6;

/* ── 지표 설정 ─────────────────────────────────────────────────────────────
   fmt: 툴팁/표용 값 표기. legendFmt: 범례 경계 라벨(간결형). */
function busLabel(v){ return v < 3.5 ? "여유" : (v < 4.5 ? "보통" : "혼잡"); }
function fmtSec(v){
  var m = Math.floor(v/60), s = Math.round(v - m*60);
  if (s === 60){ m += 1; s = 0; }
  return m > 0 ? (m + "분 " + s + "초") : (s + "초");
}
var METRICS = {
  parking: {
    name: "주차 점유율",
    desc: "공영주차장 실시간 점유율(현재 주차대수 ÷ 총 주차면수)의 동×시간대 평균입니다.",
    coverage: "표본 — 공영주차장 123개소. 서울 전역이 아닌 이 축(주차장)의 상태입니다.",
    fmt: function(v){ return Math.round(v*100) + "%"; },
    legendFmt: function(v){ return Math.round(v*100) + "%"; }
  },
  bus: {
    name: "버스 혼잡도",
    desc: "간선버스 실시간 혼잡도(3 여유 · 4 보통 · 5 혼잡)의 동×시간대 평균입니다.",
    coverage: "표본 — 버스 간선 5개 노선. 서울 전역이 아닌 이 축(버스 노선)의 상태입니다.",
    // 라벨은 표기(소수 1자리 반올림)된 값 기준으로 판정 — 3.45 → "3.5 · 보통"
    // 처럼 숫자와 문구가 어긋나지 않게 한다.
    fmt: function(v){ var r = Math.round(v*10)/10; return r.toFixed(1) + " · " + busLabel(r); },
    legendFmt: function(v){ return v.toFixed(1); }
  },
  subway: {
    name: "지하철 대기시간",
    desc: "접근 중인 열차의 평균 잔여 도착시간(초)의 동×시간대 평균입니다.",
    coverage: "표본 — 지하철 강남·잠실·사당 3역. 서울 전역이 아닌 이 축(지하철역)의 상태입니다.",
    fmt: function(v){ return fmtSec(v); },
    legendFmt: function(v){ return fmtSec(v); }
  }
};

var PROFILE = window.PROFILE || {dongs:{}, range:["",""], days:0, generated:""};
var BOUNDARY = window.BOUNDARY || {features:[]};

/* ── 상태 ── */
var state = { metric: "parking", hour: 18 };

/* ── 지표 통계(로드 시 1회): 정렬 1회로 분위수 경계 + [min,max] 를 함께 산출.
   경계 산출: 전체(동×시간) 실측 분포의 i/6 분위수 — 시간 슬라이더를 움직여도
   색 의미가 유지되게 지표 단위 고정 스케일. 치우친 분포에서 경계가 중복되면
   중복을 제거해 계급 수를 줄인다(빈 계급·중복 라벨 방지). 최댓값과 같은
   경계도 제거(최상위 계급이 비지 않게). ── */
var STATS = (function(){
  var out = {};
  ["parking","bus","subway"].forEach(function(k){
    var vals = [];
    for (var code in PROFILE.dongs){
      var arr = PROFILE.dongs[code].m[k];
      for (var h = 0; h < arr.length; h++){
        var v = arr[h];
        if (v !== null && v !== undefined) vals.push(v);
      }
    }
    vals.sort(function(a,b){ return a-b; });
    var breaks = [];
    if (vals.length){
      var max = vals[vals.length-1];
      for (var i = 1; i < MAXCLASS; i++){
        var idx = Math.min(Math.floor(vals.length * i / MAXCLASS), vals.length-1);
        var b = vals[idx];
        if (b < max && (!breaks.length || b > breaks[breaks.length-1])) breaks.push(b);
      }
    }
    out[k] = {
      breaks: breaks,                      // 오름차순, 중복 없음
      classes: breaks.length + 1,          // 실제 계급 수 (1 ~ MAXCLASS)
      min: vals.length ? vals[0] : 0,
      max: vals.length ? vals[vals.length-1] : 1
    };
  });
  return out;
})();

function isDark(){
  var t = document.documentElement.getAttribute("data-theme");
  if (t) return t === "dark";
  return window.matchMedia && window.matchMedia("(prefers-color-scheme:dark)").matches;
}
function ramp(){ return isDark() ? RAMP_DARK : RAMP_LIGHT; }
function neutralColor(){
  return getComputedStyle(document.documentElement).getPropertyValue("--neutral").trim() || "#f0efec";
}
/* 계급 수가 줄면 램프 양끝을 유지한 채 균등 간격으로 색을 뽑는다. */
function classColors(metricKey){
  var r = ramp(), n = STATS[metricKey].classes;
  if (n >= r.length) return r;
  if (n <= 1) return [r[Math.floor(r.length/2)]];
  var out = [];
  for (var i = 0; i < n; i++) out.push(r[Math.round(i*(r.length-1)/(n-1))]);
  return out;
}
function classIndex(v, metricKey){
  var b = STATS[metricKey].breaks;
  for (var i = 0; i < b.length; i++){ if (v <= b[i]) return i; }
  return b.length;
}

/* ── 등장방형 투영 ─────────────────────────────────────────────────────────
   x = lon·cos(중앙위도)·SCALE, y = −lat·SCALE. 경도 성분에 cos(lat) 을 곱해
   서울 위도(≈37.5°)에서 가로세로 비율이 왜곡되지 않게 맞춘 뒤, 전체 bbox 로
   viewBox 를 잡는다.
   SCALE 근거: 위경도 도(°) 단위 그대로면 viewBox 폭이 ~0.33 유닛에 불과해
   CSS stroke-width(사용자 단위)가 지도 전체 폭보다 굵어져 fill 을 전부 덮는다.
   3000 을 곱해 viewBox 폭을 ~990 유닛으로 키우면 stroke 1 유닛 ≈ 렌더 0.6px
   의 hairline 이 성립한다. */
var PROJ = (function(){
  var SCALE = 3000;
  var minLon=Infinity, maxLon=-Infinity, minLat=Infinity, maxLat=-Infinity;
  BOUNDARY.features.forEach(function(f){
    eachRing(f.geometry, function(ring){
      ring.forEach(function(pt){
        if (pt[0]<minLon) minLon=pt[0]; if (pt[0]>maxLon) maxLon=pt[0];
        if (pt[1]<minLat) minLat=pt[1]; if (pt[1]>maxLat) maxLat=pt[1];
      });
    });
  });
  var midLat = (minLat+maxLat)/2;
  var kx = Math.cos(midLat*Math.PI/180);
  function px(lon){ return lon*kx*SCALE; }
  function py(lat){ return -lat*SCALE; }
  var x0=px(minLon), x1=px(maxLon), y0=py(maxLat), y1=py(minLat); // y0<y1
  return {
    vbX:x0, vbY:y0, vbW:(x1-x0), vbH:(y1-y0),
    project:function(pt){ return [px(pt[0]), py(pt[1])]; }
  };
})();

function eachRing(geom, cb){
  if (!geom) return;
  if (geom.type === "Polygon"){ geom.coordinates.forEach(cb); }
  else if (geom.type === "MultiPolygon"){
    geom.coordinates.forEach(function(poly){ poly.forEach(cb); });
  }
}
function pathFor(geom){
  var d = "";
  eachRing(geom, function(ring){
    for (var i=0;i<ring.length;i++){
      var p = PROJ.project(ring[i]);
      // SCALE=3000 스케일에서 0.01 유닛 ≈ 0.006px — 소수 2자리면 충분(파일 축소).
      d += (i===0 ? "M" : "L") + p[0].toFixed(2) + " " + p[1].toFixed(2);
    }
    d += "Z";
  });
  return d;
}

/* ── 지도 렌더(경로는 1회 생성, 색만 갱신) ── */
var SVGNS = "http://www.w3.org/2000/svg";
var pathEls = {};   // code -> <path>
var PROPS = {};     // code -> {name, gu}  (경계 속성 조회 O(1))
function buildMap(){
  var pad = PROJ.vbW * 0.01;
  var svg = document.createElementNS(SVGNS, "svg");
  svg.setAttribute("viewBox",
    (PROJ.vbX-pad)+" "+(PROJ.vbY-pad)+" "+(PROJ.vbW+2*pad)+" "+(PROJ.vbH+2*pad));
  svg.setAttribute("preserveAspectRatio","xMidYMid meet");
  svg.setAttribute("role","img");
  svg.setAttribute("aria-label","서울 행정동 교통 지표 지도");
  BOUNDARY.features.forEach(function(f){
    var code = f.properties.code;
    // 방어: 코드 없는 feature 는 색·툴팁·선택 키가 없어 렌더하지 않는다
    // (export 단계에서도 제외하지만 이전 데이터 파일과의 호환 방어).
    if (!code) return;
    PROPS[code] = {name: f.properties.name, gu: f.properties.gu};
    var el = document.createElementNS(SVGNS, "path");
    el.setAttribute("d", pathFor(f.geometry));
    // 링 winding 방향과 무관하게 내부 링(구멍)을 보존.
    el.setAttribute("fill-rule", "evenodd");
    el.setAttribute("class", "dong");
    el.setAttribute("data-code", code);
    el.addEventListener("mousemove", onDongHover);
    el.addEventListener("mouseleave", hideTip);
    el.addEventListener("click", function(){ selectDong(code); });
    pathEls[code] = el;
    svg.appendChild(el);
  });
  document.getElementById("mapholder").appendChild(svg);
}
function recolorMap(){
  var na = neutralColor();
  var colors = classColors(state.metric);
  for (var code in pathEls){
    var d = PROFILE.dongs[code];
    var v = d ? d.m[state.metric][state.hour] : null;
    var c = (v === null || v === undefined) ? na : colors[classIndex(v, state.metric)];
    pathEls[code].setAttribute("fill", c);
  }
}

/* ── 이름/구 조회(profile 우선, 없으면 경계 속성 맵) ── */
function dongInfo(code){
  var d = PROFILE.dongs[code];
  if (d) return {name:d.name, gu:d.gu};
  return PROPS[code] || {name:code, gu:""};
}

/* ── 툴팁: 내용은 (code, metric, hour) 가 바뀔 때만 재생성, mousemove 는 위치만 ── */
var tip = document.getElementById("tip");
var tipKey = "";
function onDongHover(ev){
  var code = ev.currentTarget.getAttribute("data-code");
  var key = code + "|" + state.metric + "|" + state.hour;
  if (key !== tipKey){
    tipKey = key;
    var info = dongInfo(code);
    var d = PROFILE.dongs[code];
    var m = METRICS[state.metric];
    var valStr = "데이터 없음", obsStr = "";
    if (d){
      var v = d.m[state.metric][state.hour];
      var obs = d.obs[state.metric][state.hour];
      valStr = (v===null||v===undefined) ? "이 시간 관측 없음" : m.fmt(v);
      obsStr = (obs>0) ? ("관측 " + obs + "일") : "";
    }
    tip.innerHTML =
      '<div class="t-name">'+esc(info.name)+'</div>'+
      '<div class="t-gu">'+esc(info.gu)+'</div>'+
      '<div class="t-val">'+esc(m.name)+': '+esc(valStr)+'</div>'+
      (obsStr ? '<div class="t-obs">'+obsStr+'</div>' : '');
  }
  tip.style.opacity = "1";
  positionTip(ev);
}
function positionTip(ev){
  var x = ev.clientX + 14, y = ev.clientY + 14;
  var w = tip.offsetWidth, h = tip.offsetHeight;
  if (x + w > window.innerWidth - 8) x = ev.clientX - w - 14;
  if (y + h > window.innerHeight - 8) y = ev.clientY - h - 14;
  // 화면 좌상단 밖으로 나가지 않게 하한 클램프.
  tip.style.left = Math.max(8, x) + "px";
  tip.style.top = Math.max(8, y) + "px";
}
function hideTip(){ tip.style.opacity = "0"; tipKey = ""; }
function esc(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}

/* ── 상세 패널: 활성 지표 24h 곡선 + 세 지표 미니 요약 ──
   hour 만 바뀔 때는 SVG 를 다시 만들지 않고 현재시각 크로스헤어·미니 .now 만
   갱신한다(updateDetailHour). 곡선 재생성은 동/지표/테마 변경 시(renderDetail). */
var selCode = null;
var curveCtx = null; // {X: h->svg x 함수} — 크로스헤어 이동용
function selectDong(code){
  selCode = code;
  for (var c in pathEls) pathEls[c].classList.remove("sel");
  if (pathEls[code]) pathEls[code].classList.add("sel");
  renderDetail();
}
function renderDetail(){
  hideTip(); // innerHTML 교체로 hover 대상이 사라져도 툴팁이 남지 않게.
  var ph = document.getElementById("detailph");
  var body = document.getElementById("detailbody");
  if (!selCode || !PROFILE.dongs[selCode]){
    ph.classList.remove("hidden"); body.classList.add("hidden"); return;
  }
  ph.classList.add("hidden"); body.classList.remove("hidden");
  var d = PROFILE.dongs[selCode];
  var m = METRICS[state.metric];
  // 미니 요약: 세 지표의 현재시각 값(data-mini 로 hour 갱신 대상 표시) + 일평균
  var mini = "";
  ["parking","bus","subway"].forEach(function(k){
    var mm = METRICS[k];
    var now = d.m[k][state.hour];
    var arr = d.m[k].filter(function(v){ return v!==null&&v!==undefined; });
    var avg = arr.length ? arr.reduce(function(a,b){return a+b;},0)/arr.length : null;
    mini +=
      '<div class="m"><div class="lab">'+esc(mm.name)+'</div>'+
      '<div class="now" data-mini="'+k+'">'+(now===null||now===undefined?"—":esc(mm.fmt(now)))+'</div>'+
      '<div class="avg">일평균 '+(avg===null?"—":esc(mm.fmt(avg)))+'</div></div>';
  });
  body.innerHTML =
    '<p class="dname">'+esc(d.name)+'</p>'+
    '<p class="dgu">'+esc(d.gu)+'</p>'+
    '<div class="mini">'+mini+'</div>'+
    '<div class="chartcap">'+esc(m.name)+' 24시간 추이</div>'+
    '<div id="detailchart"></div>';
  drawCurve(d.m[state.metric], m);
}
function updateDetailHour(){
  if (!selCode || !PROFILE.dongs[selCode]) return;
  var d = PROFILE.dongs[selCode];
  var els = document.querySelectorAll("#detailbody [data-mini]");
  for (var i=0;i<els.length;i++){
    var k = els[i].getAttribute("data-mini");
    var v = d.m[k][state.hour];
    els[i].textContent = (v===null||v===undefined) ? "—" : METRICS[k].fmt(v);
  }
  if (curveCtx){
    var line = document.getElementById("cx-cur");
    if (line){
      var x = curveCtx.X(state.hour);
      line.setAttribute("x1", x); line.setAttribute("x2", x);
    }
  }
}
function drawCurve(series, m){
  hideTip();
  var W = 300, H = 150, ml = 8, mr = 8, mt = 10, mb = 22;
  var iw = W-ml-mr, ih = H-mt-mb;
  var st = STATS[state.metric];
  var lo = st.min, hi = st.max; if (hi===lo) hi = lo+1;
  var axis = getComputedStyle(document.documentElement).getPropertyValue("--axis").trim();
  var grid = getComputedStyle(document.documentElement).getPropertyValue("--grid").trim();
  var strong = getComputedStyle(document.documentElement).getPropertyValue("--line-strong").trim();
  function X(h){ return ml + iw * (h/23); }
  function Y(v){ return mt + ih * (1 - (v-lo)/(hi-lo)); }
  curveCtx = {X: X};
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" role="img" aria-label="'+esc(m.name)+' 24시간 곡선">';
  // recessive gridlines (0/6/12/18/23시)
  [0,6,12,18,23].forEach(function(h){
    svg += '<line x1="'+X(h)+'" y1="'+mt+'" x2="'+X(h)+'" y2="'+(mt+ih)+'" stroke="'+grid+'" stroke-width="1"/>';
    svg += '<text x="'+X(h)+'" y="'+(H-6)+'" fill="'+axis+'" font-size="10" text-anchor="middle">'+h+'</text>';
  });
  // line (null 은 끊어서 이음)
  var dstr = "", started = false;
  for (var h=0; h<24; h++){
    var v = series[h];
    if (v===null||v===undefined){ started=false; continue; }
    dstr += (started ? "L" : "M") + X(h).toFixed(1) + " " + Y(v).toFixed(1);
    started = true;
  }
  svg += '<path d="'+dstr+'" fill="none" stroke="'+strong+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
  // 점(관측 지점)
  for (var h2=0; h2<24; h2++){
    var v2 = series[h2];
    if (v2===null||v2===undefined) continue;
    svg += '<circle cx="'+X(h2)+'" cy="'+Y(v2)+'" r="2.4" fill="'+strong+'"/>';
  }
  // 현재 시간 크로스헤어 표시
  svg += '<line id="cx-cur" x1="'+X(state.hour)+'" y1="'+mt+'" x2="'+X(state.hour)+'" y2="'+(mt+ih)+'" stroke="'+strong+'" stroke-width="1" stroke-dasharray="3 3" opacity=".55"/>';
  // hover 크로스헤어 (동적)
  svg += '<line id="cx-hover" x1="0" y1="'+mt+'" x2="0" y2="'+(mt+ih)+'" stroke="'+axis+'" stroke-width="1" opacity="0"/>';
  svg += '<rect id="cx-hit" x="'+ml+'" y="'+mt+'" width="'+iw+'" height="'+ih+'" fill="transparent"/>';
  svg += '</svg>';
  var holder = document.getElementById("detailchart");
  holder.innerHTML = svg;
  // 곡선 hover 크로스헤어 + 툴팁
  var svgEl = holder.querySelector("svg");
  var hitEl = holder.querySelector("#cx-hit");
  var hoverEl = holder.querySelector("#cx-hover");
  hitEl.addEventListener("mousemove", function(ev){
    var r = svgEl.getBoundingClientRect();
    var px = (ev.clientX - r.left) / r.width * W;
    var h = Math.round((px - ml) / iw * 23);
    if (h<0) h=0; if (h>23) h=23;
    hoverEl.setAttribute("x1", X(h)); hoverEl.setAttribute("x2", X(h));
    hoverEl.setAttribute("opacity", "0.7");
    var v = series[h];
    tip.innerHTML = '<div class="t-name">'+h+':00</div><div class="t-val">'+
      esc(m.name)+': '+(v===null||v===undefined?"관측 없음":esc(m.fmt(v)))+'</div>';
    tipKey = "curve"; // 지도 툴팁 캐시와 충돌하지 않게 별도 키
    tip.style.opacity = "1"; positionTip(ev);
  });
  hitEl.addEventListener("mouseleave", function(){ hoverEl.setAttribute("opacity","0"); hideTip(); });
}

/* ── 범례: 계급 색 셀 + 경계 라벨을 색 경계 위치(i/계급수)에 절대 배치 ── */
function renderLegend(){
  var bar = document.getElementById("legendbar");
  var labs = document.getElementById("legendlabels");
  var colors = classColors(state.metric);
  var b = STATS[state.metric].breaks;
  var n = colors.length;
  var m = METRICS[state.metric];
  bar.innerHTML = ""; labs.innerHTML = "";
  for (var i=0;i<n;i++){
    var s = document.createElement("span"); s.style.background = colors[i]; bar.appendChild(s);
  }
  var lo = document.createElement("span");
  lo.className = "edge-lo"; lo.style.left = "0"; lo.textContent = "낮음";
  labs.appendChild(lo);
  b.forEach(function(bv, j){
    var sp = document.createElement("span");
    sp.style.left = ((j+1)/n*100) + "%";       // 색 경계와 기하 정렬
    sp.textContent = m.legendFmt(bv);
    labs.appendChild(sp);
  });
  var hi = document.createElement("span");
  hi.className = "edge-hi"; hi.style.left = "100%"; hi.textContent = "높음";
  labs.appendChild(hi);
}

/* ── 표 보기 ── */
var tableSort = {col:"value", dir:-1};
function renderTable(){
  var thead = document.querySelector("#datatable thead");
  var tbody = document.querySelector("#datatable tbody");
  var m = METRICS[state.metric];
  var rows = [];
  for (var code in PROFILE.dongs){
    var d = PROFILE.dongs[code];
    var v = d.m[state.metric][state.hour];
    var obs = d.obs[state.metric][state.hour];
    rows.push({name:d.name, gu:d.gu, value:v, obs:obs});
  }
  var col = tableSort.col, dir = tableSort.dir;
  rows.sort(function(a,b){
    var av=a[col], bv=b[col];
    if (col==="value"){ // null 은 정렬 방향과 무관하게 항상 맨 아래
      var an = (av===null||av===undefined), bn = (bv===null||bv===undefined);
      if (an && bn) return 0;   // comparator 계약: 동치는 0
      if (an) return 1;
      if (bn) return -1;
    }
    if (typeof av==="string") return av.localeCompare(bv,"ko")*dir;
    return (av-bv)*dir;
  });
  thead.innerHTML =
    '<tr><th data-col="name">동</th><th data-col="gu">구</th>'+
    '<th class="num" data-col="value">'+esc(m.name)+' ('+state.hour+':00)</th>'+
    '<th class="num" data-col="obs">관측일수</th></tr>';
  thead.querySelectorAll("th").forEach(function(th){
    th.addEventListener("click", function(){
      var c = th.getAttribute("data-col");
      if (tableSort.col===c) tableSort.dir *= -1;
      else { tableSort.col=c; tableSort.dir = (c==="name"||c==="gu")?1:-1; }
      renderTable();
    });
  });
  var html = "";
  rows.forEach(function(row){
    html += "<tr><td>"+esc(row.name)+"</td><td>"+esc(row.gu)+"</td>"+
      '<td class="num">'+(row.value===null||row.value===undefined?"—":esc(m.fmt(row.value)))+"</td>"+
      '<td class="num">'+(row.obs>0?row.obs:"—")+"</td></tr>";
  });
  tbody.innerHTML = html;
}

/* ── 갱신 경로 2단: hour 만(가벼움) / 전체(지표·테마 변경).
   rAF 로 코얼레싱 — 슬라이더 drag 연타 시 프레임당 1회만 실제 갱신. ── */
function updateHour(){
  setMapTitle();
  recolorMap();
  updateDetailHour();
  if (!document.getElementById("tablewrap").classList.contains("hidden")) renderTable();
}
function updateAll(){
  var m = METRICS[state.metric];
  document.getElementById("metricdesc").textContent = m.desc;
  document.getElementById("coverage").innerHTML = "<b>커버리지 안내</b> — " + esc(m.coverage);
  setMapTitle();
  recolorMap();
  renderLegend();       // 지표·테마 변경 시에만 (hour 경로에서는 불변)
  renderDetail();
  if (!document.getElementById("tablewrap").classList.contains("hidden")) renderTable();
}
function setMapTitle(){
  document.getElementById("maptitle").textContent =
    METRICS[state.metric].name + " · " + pad2(state.hour) + ":00 (동별 색이 진할수록 값이 큼)";
}
var rafId = null, rafNeedAll = false;
function schedule(all){
  if (all) rafNeedAll = true;
  if (rafId === null){
    rafId = requestAnimationFrame(function(){
      rafId = null;
      var a = rafNeedAll; rafNeedAll = false;
      if (a) updateAll(); else updateHour();
    });
  }
}
function pad2(n){ return (n<10?"0":"")+n; }

/* ── 실시간 도착 전광판 ───────────────────────────────────────────────────
   지하철 실시간 도착정보 API(realtimeStationArrival)의 열차 잔여 도착시간
   (barvlDt)을 역×노선×방향별로 그대로 보여준다 — 활용사례 심사에서 API 사용이
   화면으로 확인되게. 색 칩은 노선 식별용(서울 지하철 공식 노선색), 텍스트는
   잉크/강조 토큰만. 데이터: window.ARRIVALS(정적 스냅샷). */
var LINE_COLOR = {
  "1호선":"#0052A4","2호선":"#00A84D","3호선":"#EF7C1C","4호선":"#00A5DE",
  "5호선":"#996CAC","6호선":"#CD7C2F","7호선":"#747F00","8호선":"#E6186C",
  "9호선":"#BDB092","신분당선":"#D4003B","수인분당선":"#FABE00",
  "경의중앙선":"#77C4A3","공항철도":"#0090D2","경춘선":"#178C72",
  "우이신설선":"#B7C452","서해선":"#8FC31F"
};
function renderBoard(){
  var A = window.ARRIVALS, el = document.getElementById("board");
  if (!el) return;
  if (!A || !A.stations || !A.stations.length){ el.style.display = "none"; return; }
  var cards = A.stations.map(function(s){
    var rows = s.arrivals.map(function(a){
      var color = LINE_COLOR[a.line] || getComputedStyle(document.documentElement)
        .getPropertyValue("--axis").trim();
      // barvlDt>0 이면 잔여시간을 크게, 도착 메시지를 작게. 0 이면(도착·전역 등)
      // 잔여초가 없으므로 메시지를 크게 — '0초' 오표기를 피한다(정직 표기).
      var hasEta = a.eta_s > 0;
      var big = hasEta ? fmtSec(a.eta_s) : (a.msg || "도착 정보");
      var small = hasEta ? a.msg : "";
      return '<div class="arr">'+
        '<span class="chip" style="background:'+color+'"></span>'+
        '<div class="who"><div class="svc">'+esc(a.service)+'</div>'+
        '<div class="dir">'+esc(a.line)+(a.updn?(' · '+esc(a.updn)):'')+'</div></div>'+
        '<div class="eta"><div class="t">'+esc(big)+'</div>'+
        (small?('<div class="m">'+esc(small)+'</div>'):'')+'</div></div>';
    }).join("");
    return '<div class="stn"><p class="snm">'+esc(s.name)+'역</p>'+
      '<p class="srecv">수신 '+esc(s.received)+'</p>'+rows+'</div>';
  }).join("");
  el.innerHTML =
    '<div class="bhead"><h2>🚇 지하철 실시간 도착 — 열차 잔여 도착시간</h2>'+
    '<span class="bmeta">'+esc(A.snapshot_kst)+' 수집 스냅샷 (월)</span></div>'+
    '<p class="bnote">'+esc(A.source)+
    ' · 수집 대상 3역의 접근 열차 잔여 도착시간(barvlDt)·도착 메시지(arvlMsg2)</p>'+
    '<div class="stations">'+cards+'</div>';
}

/* ── 초기화 & 이벤트 ── */
function init(){
  var hourEl = document.getElementById("hour");
  // Firefox 등은 새로고침 시 슬라이더 값을 복원한다 — state 를 DOM 에 동기화.
  var hv = parseInt(hourEl.value, 10);
  if (!isNaN(hv) && hv >= 0 && hv <= 23) state.hour = hv;
  document.getElementById("hourval").textContent = pad2(state.hour) + ":00";

  document.getElementById("asof").textContent =
    "데이터 기준: " + PROFILE.range[0] + " ~ " + PROFILE.range[1] +
    " (" + (PROFILE.days||0) + "일 평균) · 정적 스냅샷 · 마지막 갱신: " +
    (PROFILE.generated||"-") + " · 총 " + Object.keys(PROFILE.dongs).length + "개 동 표본";

  buildMap();
  updateAll();

  // 탭
  document.getElementById("tabs").addEventListener("click", function(ev){
    var t = ev.target.closest(".tab"); if (!t) return;
    state.metric = t.getAttribute("data-metric");
    document.querySelectorAll(".tab").forEach(function(x){
      x.setAttribute("aria-selected", x===t ? "true" : "false");
    });
    schedule(true);
  });
  // 슬라이더 — 라벨은 즉시, 나머지는 rAF 코얼레싱
  hourEl.addEventListener("input", function(){
    state.hour = parseInt(hourEl.value, 10);
    document.getElementById("hourval").textContent = pad2(state.hour) + ":00";
    tipKey = ""; // 시간 변경 시 툴팁 캐시 무효화
    schedule(false);
  });
  // 표 토글
  var tbtn = document.getElementById("tabletoggle");
  tbtn.addEventListener("click", function(){
    var tw = document.getElementById("tablewrap");
    var open = tw.classList.toggle("hidden") === false;
    tbtn.setAttribute("aria-expanded", open ? "true" : "false");
    tbtn.textContent = open ? "표 접기 ▴" : "표로 보기 ▾";
    if (open) renderTable();
  });
  // 테마 토글
  document.getElementById("themebtn").addEventListener("click", function(){
    var cur = document.documentElement.getAttribute("data-theme");
    var next = cur ? (cur==="dark"?"light":"dark") : (isDark()?"light":"dark");
    document.documentElement.setAttribute("data-theme", next);
    schedule(true);
  });
  // OS 테마 변경 반영(수동 토글 없을 때). 구형 브라우저는 addListener 폴백.
  if (window.matchMedia){
    var mq = window.matchMedia("(prefers-color-scheme:dark)");
    var onThemeChange = function(){
      if (!document.documentElement.getAttribute("data-theme")) schedule(true);
    };
    if (mq.addEventListener) mq.addEventListener("change", onThemeChange);
    else if (mq.addListener) mq.addListener(onThemeChange);
  }
}

renderBoard();  // 도착 전광판은 지도 데이터와 독립적으로 렌더
if (BOUNDARY.features && BOUNDARY.features.length){
  init();
} else {
  document.getElementById("mapholder").innerHTML =
    '<p style="color:var(--axis)">데이터를 불러오지 못했습니다. data/boundary.js · data/profile.js 를 확인하세요.</p>';
}
</script>
